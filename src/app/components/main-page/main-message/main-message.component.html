<div class="page-container">
  <div class="content-header-wrapper">
    <div class="content-header-container">
      <app-main-content-header
          [context]="context"
          [isAutocompleteDisabled]="true"
          [isSearchOn]="false"
          [labels]="null">
      </app-main-content-header>
      <button (click)="markMessagesAsRead()" [disabled]="isAllRead"
              class="header-action-btn"
              id="mark-all-read-btn">
        <div>Mark all as read</div>
      </button>
    </div>
  </div>

  <div class="content-container">
    @if (getMessages().length > 0) {
      <div class="items">
        @for (message of getMessages(); track message) {
          <div [ngClass]="{'unread':!message.is_read}" class="item">
            <div class="title">{{ message.subject }}</div>
            <span class="label">{{ getIsoToTimestamp(message.broadcasted) | dateDisplay }}</span>
            <div [innerHtml]="message.message"
                 class="description">
            </div>
          </div>
        }
      </div>
    } @else {
      <section class="status-info-container">
        <div class="empty-status">
          <div class="status-headline">No messages yet</div>
        </div>
      </section>
    }
  </div>
</div>
