<div [ngClass]="context?.identifier" class="page-container">
  <div class="content-header-wrapper">
    <div class="content-header-container">
      <app-main-content-header (emitApplyFilter)="applyFilter($event)"
                               [context]="context"
                               [isAutocompleteDisabled]="true"
                               [isSearchOn]="true"
                               [labels]="selectedCatalog ? selectedCatalog.labels : []">
      </app-main-content-header>
      <button (click)="openJoinWorkspaceDialog()"
              aria-label="Join Workspace"
              class="join-workspace-button"
              mat-button>
        Join workspace
      </button>
    </div>
  </div>

  <!-- Application categories -->
  <div class="content-container">
    <!--  Service Announcement 'catalog'  -->
    <app-service-announcement [context]="context"></app-service-announcement>
    <ng-container *ngIf="categories.length > 0; else loadingBlock">
      <mat-tab-group (selectedTabChange)="changeCategory($event)"
                     mat-align-tabs="center"
                     mat-stretch-tabs="false">
        <ng-container *ngFor="let category of categories">
          <mat-tab label="{{ category.name }}">
            <div *ngIf="selectedCatalog?.name === category.name" class="tab-content">
              <div *ngIf="applications?.length > 0; else noApplicationBlock"
                   class="application-item-container">
                <ng-container *ngFor="let application of applications">
                  <app-main-application-item [application]="application" [context]="context">
                  </app-main-application-item>
                </ng-container>
              </div>
              <div *ngIf="getPublicApplicationAccessNote()"
                   [innerHTML]="getPublicApplicationAccessNote()"
                   class="no-public-applications-text status-summary">
              </div>
            </div>
            <!-- //// tab-content -->
          </mat-tab>
        </ng-container>
      </mat-tab-group>
    </ng-container>

    <ng-template #loadingBlock>
      <section class="status-info-container">
        <div class="loading-status">
          <span class="status-headline">...Loading...</span>
        </div>
      </section>
    </ng-template>

    <ng-template #noApplicationBlock>
      <section class="status-info-container">
        <div class="empty-status">
          <div class="status-headline">No applications found</div>
          <div class="status-summary">
            If you want to add more applications,<br> Join a workspace using the button on top to access
            the content.
          </div>
        </div>
      </section>
    </ng-template>

  </div>
</div>
