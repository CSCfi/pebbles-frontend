<section class="welcome-content-wrapper">
  <!-- Left -->
  <div class="left-content-wrapper">
    <h2>{{ publicConfigService.getShortDescription() }}</h2>
    <div [innerHTML]="publicConfigService.getInstallationDescription()"
         class="service-description">
    </div>
    <div class="login-wrapper">
      <a class="oauth-login-button" href="/oauth2?rd=%2Foauth2" id="oauth-login-button" mat-button mat-raised-button>
        <h3>Login</h3>
        <h5>{{ publicConfigService.getLoginButtonText() }}</h5>
      </a>
      <button (click)="openSpecialLogin()" class="special-login-button" id="special-login-button" mat-button>
        Special Login
      </button>
    </div>
    <!--  Service Announcement 'welcome'  -->
    <app-service-announcement [context]="context"></app-service-announcement>
  </div>
  <!-- // Left -->

  <!-- Right -->
  <div class="hero-shots right-content-wrapper" id="hero-shots">
    <div class="background-images">
      <app-welcome-background [cube]="0" class="app-welcome-background"></app-welcome-background>
      <app-welcome-background [cube]="1" class="app-welcome-background"></app-welcome-background>
      <app-welcome-background [cube]="2" class="app-welcome-background"></app-welcome-background>
      <app-welcome-background [cube]="3" class="app-welcome-background"></app-welcome-background>
    </div>
    <div class="hero-video">
      <video autoplay
             muted
             onloadeddata="this.play();"
             onloadedmetadata="this.muted = true">
        <source alt="demo-video" src="assets/images/demo.mp4" type="video/mp4">
