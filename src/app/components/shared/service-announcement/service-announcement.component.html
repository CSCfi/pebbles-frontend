@for (item of getServiceAnnouncements(); track item) {
  <div [ngClass]="getServiceAnnouncementType(item.level)"
       class="service-announcement-item">
    <span [innerHTML]="item.subject" class="service-announcement-subject"></span>
    <span [innerHTML]="item.content" class="service-announcement-content render-hyperlinks-dark-bg"></span>
  </div>
}
